name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x64
            archive: eid-service-linux-x64.tar.gz
            format: tar.gz
          - runner: macos-latest
            os: darwin
            arch: x64
            archive: eid-service-darwin-x64.tar.gz
            format: tar.gz
          - runner: windows-latest
            os: windows
            arch: x64
            archive: eid-service-windows-x64.zip
            format: zip

    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.os }}-${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install pcsclite headers (Linux)
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev

      - name: Install dependencies
        run: npm install

      - name: Build (Linux/macOS)
        if: matrix.os != 'windows'
        run: ./build.sh

      - name: Build (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          # Detect addon package
          $AddonPkg = "@pcsc-mini/windows-x86_64-node"
          $AddonSrc = "node_modules/$AddonPkg/addon.node"

          if (-not (Test-Path $AddonSrc)) {
            Write-Error "Native addon not found at $AddonSrc"
            exit 1
          }

          # Create patched pcsc-mini for compilation
          $BuildTmp = ".build-tmp"
          New-Item -ItemType Directory -Path $BuildTmp -Force | Out-Null
          New-Item -ItemType Directory -Path "$BuildTmp/node_modules" -Force | Out-Null
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null

          # Create patched addon loader
          @'
          "use strict";
          const path = require("node:path");
          const addonPath = path.join(path.dirname(process.execPath), "addon.node");
          const mod = { exports: {} };
          process.dlopen(mod, addonPath);
          module.exports = mod.exports;
          '@ | Set-Content "$BuildTmp/addon.node.js"

          # Copy and patch pcsc-mini
          Copy-Item -Recurse "node_modules/pcsc-mini" "$BuildTmp/node_modules/pcsc-mini"
          Copy-Item "$BuildTmp/addon.node.js" "$BuildTmp/node_modules/pcsc-mini/build/addon.node.js"

          # Copy ws module
          Copy-Item -Recurse "node_modules/ws" "$BuildTmp/node_modules/ws"

          # Copy host.js
          Copy-Item "host.js" "$BuildTmp/host.js"

          # Compile
          bun build --compile "$BuildTmp/host.js" --outfile "dist/eid-service.exe"

          # Copy addon
          Copy-Item $AddonSrc "dist/addon.node"

          # Clean up
          Remove-Item -Recurse -Force $BuildTmp

      - name: Install Inno Setup
        if: matrix.os == 'windows'
        run: choco install innosetup -y --no-progress

      - name: Build installer
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}" -replace "^v", ""
          iscc /DAppVersion="$Version" installer.iss

      - name: Create archive (tar.gz)
        if: matrix.format == 'tar.gz'
        run: tar -czf "${{ matrix.archive }}" -C dist eid-service addon.node

      - name: Create archive (zip)
        if: matrix.format == 'zip'
        shell: pwsh
        run: Compress-Archive -Path "dist\eid-service.exe","dist\addon.node" -DestinationPath "${{ matrix.archive }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

      - uses: actions/upload-artifact@v4
        if: matrix.os == 'windows'
        with:
          name: eid-service-windows-x64-setup.exe
          path: eid-service-windows-x64-setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
